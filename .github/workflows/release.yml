name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: asmlings-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: asmlings-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: asmlings-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: asmlings-windows-x86_64.exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # Rename Unix binaries for clear release assets
      - name: Rename Binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: mv target/${{ matrix.target }}/release/asmlings target/${{ matrix.target }}/release/${{ matrix.asset_name }}

      # Rename Windows binaries using Powershell
      - name: Rename Binary (Windows)
        if: matrix.os == 'windows-latest'
        run: Rename-Item -Path "target\${{ matrix.target }}\release\asmlings.exe" -NewName "${{ matrix.asset_name }}"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.asset_name }}
